name: Deploy WordPress

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.6.0
  # Fix for expired OpenPGP key bug
  CHECKPOINT_DISABLE: 1

jobs:
  terraform:
    name: Terraform — Build Infrastructure
    runs-on: ubuntu-latest

    outputs:
      server_ip: ${{ steps.tf_output.outputs.server_ip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -upgrade
        env:
          # Skip GPG signature verification
          TF_CLI_ARGS: "-lockfile=readonly"
          GONOSUMCHECK: "*"

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Get Server IP
        id: tf_output
        working-directory: terraform
        run: |
          echo "server_ip=$(terraform output -raw server_ip)" >> $GITHUB_OUTPUT

  ansible:
    name: Ansible — Install WordPress
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/wordpress-key.pem
          chmod 400 ~/.ssh/wordpress-key.pem

      - name: Wait for EC2 to be ready
        run: sleep 60

      - name: Create Ansible Inventory
        run: |
          echo "[wordpress]" > ansible/inventory.ini
          echo "${{ needs.terraform.outputs.server_ip }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/wordpress-key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> ansible/inventory.ini

      - name: Test SSH Connection
        run: |
          ssh -i ~/.ssh/wordpress-key.pem \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ needs.terraform.outputs.server_ip }} \
            "echo SSH connection successful!"

      - name: Run Ansible Playbook
        run: |
          ansible-playbook \
            -i ansible/inventory.ini \
            ansible/playbook.yml \
            -v

      - name: WordPress is Live!
        run: |
          echo "========================================"
          echo "✅ WordPress deployed successfully!"
          echo "🌐 Visit: http://${{ needs.terraform.outputs.server_ip }}"
          echo "========================================"
